<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">

<style>
*{box-sizing:border-box}
body{margin:0;background:#0e1118;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif}
.wrap{max-width:480px;margin:0 auto;min-height:100vh;background:#11151d}
.hero{padding:28px 18px 0;background:linear-gradient(180deg,#172a58 0%,#10151f 100%)}
.photo{width:100%;border-radius:28px;display:block;box-shadow:0 16px 40px rgba(0,0,0,.35)}
.content{padding:22px 18px 34px}
h1{font-size:34px;margin:0 0 8px;letter-spacing:-.04em}
.role{font-size:19px;color:#ddd;line-height:1.5;margin-bottom:18px}
.badges{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.badge{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);padding:9px 12px;border-radius:999px;font-size:14px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.btn{display:block;text-decoration:none;text-align:center;border-radius:18px;padding:16px 12px;font-size:18px;font-weight:800;background:#252b36;color:#fff;border:1px solid rgba(255,255,255,.12)}
.btn.main{background:#fff;color:#111}
.card{border-radius:22px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);padding:14px;margin-top:12px}
.row{display:flex;justify-content:space-between;gap:10px;padding:15px 0;border-bottom:1px solid rgba(255,255,255,.1);color:#fff;text-decoration:none}
.row:last-child{border-bottom:0}
.label{color:#aaa}
.value{font-weight:800;text-align:right}
.copy{font-size:16px;line-height:1.75;color:#e6e6e6}
.footer{text-align:center;color:#777;font-size:12px;padding-top:20px}
</style>
</head>
<body>
<main class="wrap">
  <section class="hero"><img class="photo" src="portrait.png" alt="서진우 프로필 사진"></section>
  <section class="content">
    <h1>서진우</h1>
    <div class="role">다함상조 · 수석장례지도사</div>
    <div class="badges">
      <span class="badge">공식 디지털 명함</span>
      <span class="badge">장례 상담</span>
      <span class="badge">수석장례지도사</span>
    </div>
    <div class="actions">
      <a class="btn main" href="tel:01020372036">전화걸기</a>
      <a class="btn" href="mailto:parkmj0378@naver.com">이메일</a>
    </div>
    <div class="card">
      <a class="row" href="tel:01020372036"><span class="label">휴대전화</span><span class="value">010-2037-2036 ›</span></a>
      <a class="row" href="mailto:parkmj0378@naver.com"><span class="label">이메일</span><span class="value">parkmj0378@naver.com ›</span></a>
    </div>
    <div class="card copy">가족의 마음을 먼저 생각하며, 장례 절차 상담부터 의전 진행까지 차분하고 정확하게 안내드립니다.</div>
    <div class="footer">다함상조</div>
  </section>
</main>
</body>
</html>
