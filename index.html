<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>박민재 디지털명함</title>

<style>
body{
margin:0;
background:#0f172a;
font-family:sans-serif;
color:white;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.photo{
width:100%;
border-radius:30px;
}

.name{
font-size:48px;
font-weight:bold;
margin-top:20px;
}

.job{
font-size:22px;
margin-top:10px;
color:#cbd5e1;
}

.buttons{
display:flex;
gap:10px;
margin-top:20px;
}

.btn{
flex:1;
padding:18px;
text-align:center;
border-radius:15px;
text-decoration:none;
font-size:20px;
}

.call{
background:white;
color:black;
}

.mail{
background:#1e293b;
color:white;
}

.info{
margin-top:20px;
background:#1e293b;
padding:20px;
border-radius:20px;
}

.row{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid rgba(255,255,255,.1);
}

.row:last-child{
border:none;
}
</style>

</head>

<body>

<div class="container">

<img src="portrait.png" class="photo">

<div class="name">박민재</div>

<div class="job">
다함상조 · 장례지도사
</div>

<div class="buttons">
<a class="btn call" href="tel:01051985900">전화걸기</a>
<a class="btn mail" href="mailto:parkmj0378@naver.com">이메일</a>
</div>

<div class="info">

<div class="row">
<span>휴대전화</span>
<span>010-5198-5900</span>
</div>

<div class="row">
<span>이메일</span>
<span>parkmj0378@naver.com</span>
</div>

</div>

</div>

</body>
</html>
