<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>다함상조 디지털명함</title>

<style>

body{
margin:0;
background:#0f172a;
font-family:sans-serif;
color:white;
}

.header{
text-align:center;
padding:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
max-width:1200px;
margin:auto;
}

.card{
background:#1e293b;
border-radius:20px;
overflow:hidden;
text-decoration:none;
color:white;
box-shadow:0 0 15px rgba(0,0,0,.3);
}

.card img{
width:100%;
height:320px;
object-fit:cover;
}

.info{
padding:15px;
}

.name{
font-size:24px;
font-weight:bold;
}

.job{
color:#cbd5e1;
margin-top:5px;
}

</style>
</head>

<body>

<div class="header">
<h1>다함상조 디지털 명함</h1>
<p>직원을 선택하세요</p>
</div>

<div class="grid">

<a class="card" href="./parkminjae/">
<img src="./parkminjae/portrait.png">
<div class="info">
<div class="name">박민재</div>
<div class="job">장례지도사</div>
</div>
</a>

<a class="card" href="./hongkyunghee/">
<img src="./hongkyunghee/portrait.png">
<div class="info">
<div class="name">홍경희</div>
<div class="job">VIP 의전팀장</div>
</div>
</a>

<a class="card" href="./anjia/">
<img src="./anjia/portrait.png">
<div class="info">
<div class="name">안지아</div>
<div class="job">팀장</div>
</div>
</a>

<a class="card" href="./seojinwoo/">
<img src="./seojinwoo/portrait.png">
<div class="info">
<div class="name">서진우</div>
<div class="job">수석장례지도사</div>
</div>
</a>

</div>

</body>
</html>
